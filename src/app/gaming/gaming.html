<div class="gaming-container">
    <div class="header">
        <h2>Gaming</h2>
    </div>
    <div class="gaming-grid">
        <mat-card class="game-card" *ngFor="let i of [1,2,3,4,5,6]">
            <img mat-card-image [src]="'https://picsum.photos/seed/game'+i+'/200/300'" alt="Game">
            <mat-card-content>
                <div class="game-name">Epic Quest {{ i }}</div>
                <div class="watchers">{{ i * 2.5 }}K viewers</div>
            </mat-card-content>
        </mat-card>
    </div>
</div>
