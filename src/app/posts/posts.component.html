<div class="posts-container">
  <div class="posts-header">
    <h1>Company Posts</h1>
    <button mat-fab color="primary" (click)="openCreatePostDialog()">
      <mat-icon>add</mat-icon>
    </button>
  </div>

  <div class="posts-list">
    @for (post of posts(); track post.id) {
      <mat-card class="post-card">
        <mat-card-header>
          <mat-card-title>{{ post.author }}</mat-card-title>
          <mat-card-subtitle>{{ post.timestamp | date:'medium' }}</mat-card-subtitle>
        </mat-card-header>
        
        <mat-card-content>
          <p>{{ post.content }}</p>
        </mat-card-content>
        
        <mat-card-actions>
          <button mat-button (click)="toggleLike(post)" [color]="post.liked ? 'primary' : ''">
            <mat-icon>{{ post.liked ? 'favorite' : 'favorite_border' }}</mat-icon>
            {{ post.likes }}
          </button>
          <button mat-button>
            <mat-icon>comment</mat-icon>
            {{ post.comments }}
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
