<div class="vids-container">
    <div class="header">
        <h2>Watch</h2>
    </div>
    <div class="vids-feed">
        <mat-card class="vid-card" *ngFor="let vid of videos()">
            <div class="thumbnail-container">
                <img [src]="vid.thumbnail" [alt]="vid.title">
                <div class="play-overlay">
                    <mat-icon>play_arrow</mat-icon>
                </div>
            </div>
            <mat-card-header>
                <mat-card-title>{{ vid.title }}</mat-card-title>
                <mat-card-subtitle>{{ vid.author }} • {{ vid.views }} • {{ vid.timestamp }}</mat-card-subtitle>
            </mat-card-header>
            <mat-divider></mat-divider>
            <div class="vid-actions">
                <button mat-button><mat-icon>thumb_up</mat-icon> Like</button>
                <button mat-button><mat-icon>comment</mat-icon> Comment</button>
                <button mat-button><mat-icon>share</mat-icon> Share</button>
            </div>
        </mat-card>
    </div>
</div>
